<div
  class="shrink-0 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 sm:gap-4 p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200/60 dark:border-slate-800 shadow-sm relative z-20"
>
  <!-- Backdrop para cerrar dropdowns -->
  <div *ngIf="activeDropdown" (click)="closeDropdown.emit()" class="fixed inset-0 z-10 cursor-default" aria-hidden="true"></div>

  <!-- Sección 1: Período y vista -->
  <div class="flex flex-wrap items-center gap-2 sm:gap-3">
    <span class="text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider hidden sm:inline">Período</span>

    <!-- Año -->
    <div class="relative z-20" [class.pointer-events-none]="isRestrictedUser" [class.opacity-50]="isRestrictedUser">
      <button
        (click)="!isRestrictedUser && toggleDropdown.emit('ano')"
        class="flex items-center gap-1.5 px-3 py-2 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-sm font-semibold text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-purple/30 min-w-[88px] justify-between transition-colors"
        [class.cursor-not-allowed]="isRestrictedUser"
      >
        <span>{{ selectedAno }}</span>
        <svg class="w-4 h-4 text-slate-400 shrink-0 transition-transform" [class.rotate-180]="activeDropdown === 'ano'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      </button>
      <div *ngIf="activeDropdown === 'ano'" class="absolute top-full left-0 mt-1.5 w-28 bg-white dark:bg-slate-900 rounded-xl shadow-lg border border-slate-200 dark:border-slate-700 overflow-hidden">
        <div class="max-h-56 overflow-y-auto p-1">
          <button
            *ngFor="let a of anos"
            (click)="selectAno.emit(a)"
            class="w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-colors"
            [ngClass]="selectedAno === a ? 'bg-brand-purple/15 text-brand-purple' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800'"
          >
            {{ a }}
          </button>
        </div>
      </div>
    </div>

    <!-- Mes -->
    <div class="relative z-20" [class.pointer-events-none]="isRestrictedUser" [class.opacity-50]="isRestrictedUser">
      <button
        (click)="!isRestrictedUser && toggleDropdown.emit('mes')"
        class="flex items-center gap-1.5 px-3 py-2 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-sm font-semibold text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-purple/30 min-w-[120px] justify-between transition-colors"
        [class.cursor-not-allowed]="isRestrictedUser"
      >
        <span>{{ getMesLabel(selectedMes) }}</span>
        <svg class="w-4 h-4 text-slate-400 shrink-0 transition-transform" [class.rotate-180]="activeDropdown === 'mes'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      </button>
      <div *ngIf="activeDropdown === 'mes'" class="absolute top-full left-0 mt-1.5 w-40 bg-white dark:bg-slate-900 rounded-xl shadow-lg border border-slate-200 dark:border-slate-700 overflow-hidden">
        <div class="max-h-56 overflow-y-auto p-1">
          <button
            *ngFor="let m of meses"
            (click)="selectMes.emit(m.value)"
            class="w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-colors"
            [ngClass]="selectedMes === m.value ? 'bg-brand-purple/15 text-brand-purple' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800'"
          >
            {{ m.label }}
          </button>
        </div>
      </div>
    </div>

    <div class="w-px h-6 bg-slate-200 dark:bg-slate-700 hidden sm:block" aria-hidden="true"></div>

    <!-- Vista: Congregación | Por grupos -->
    <div *ngIf="!isRestrictedUser" class="flex rounded-lg bg-slate-100 dark:bg-slate-800 p-0.5">
      <button
        (click)="setVista.emit(false)"
        [class.bg-white]="!vistaGrupo"
        [class.dark:bg-slate-700]="!vistaGrupo"
        [class.shadow-sm]="!vistaGrupo"
        [class.text-slate-900]="!vistaGrupo"
        [class.dark:text-white]="!vistaGrupo"
        class="px-3 py-1.5 rounded-md text-xs font-semibold text-slate-500 dark:text-slate-400 transition-all"
      >
        Congregación
      </button>
      <button
        (click)="setVista.emit(true)"
        [class.bg-white]="vistaGrupo"
        [class.dark:bg-slate-700]="vistaGrupo"
        [class.shadow-sm]="vistaGrupo"
        [class.text-slate-900]="vistaGrupo"
        [class.dark:text-white]="vistaGrupo"
        class="px-3 py-1.5 rounded-md text-xs font-semibold text-slate-500 dark:text-slate-400 transition-all"
      >
        Por grupos
      </button>
    </div>

    <!-- Grupo (si vista por grupos) -->
    <div *ngIf="vistaGrupo && !isRestrictedUser" class="relative z-20">
      <button
        (click)="toggleDropdown.emit('grupo')"
        class="flex items-center gap-1.5 px-3 py-2 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-sm font-semibold text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-purple/30 min-w-[140px] sm:min-w-[160px] justify-between transition-colors"
      >
        <span class="truncate">{{ getGrupoLabel(selectedGrupo) }}</span>
        <svg class="w-4 h-4 text-slate-400 shrink-0 transition-transform" [class.rotate-180]="activeDropdown === 'grupo'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      </button>
      <div *ngIf="activeDropdown === 'grupo'" class="absolute top-full left-0 mt-1.5 w-56 bg-white dark:bg-slate-900 rounded-xl shadow-lg border border-slate-200 dark:border-slate-700 overflow-hidden">
        <div class="max-h-56 overflow-y-auto p-1">
          <button
            (click)="selectGrupo.emit(null)"
            class="w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-colors mb-0.5"
            [ngClass]="selectedGrupo === null ? 'bg-brand-purple/15 text-brand-purple' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800'"
          >
            Todos los grupos
          </button>
          <button
            *ngFor="let g of grupos"
            (click)="selectGrupo.emit(g.id_grupo)"
            class="w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-colors flex items-center justify-between"
            [ngClass]="selectedGrupo === g.id_grupo ? 'bg-brand-purple/15 text-brand-purple' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800'"
          >
            {{ g.nombre_grupo }}
            <svg *ngIf="selectedGrupo === g.id_grupo" class="w-4 h-4 text-brand-purple" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Sección 2: Búsqueda, filtro y Excel -->
  <div class="flex flex-wrap items-center gap-2 sm:gap-3 sm:ml-auto">
    <div class="flex items-center gap-2 border-r border-slate-200 dark:border-slate-700 pr-3" *ngIf="!isRestrictedUser">
      <button (click)="exportExcel.emit()" class="p-2 rounded-lg text-slate-500 hover:text-brand-purple hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" title="Descargar plantilla Excel">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
        </svg>
      </button>
      <div class="relative">
        <input type="file" #fileInput accept=".xlsx" (change)="importExcel.emit($event)" class="hidden" />
        <button (click)="fileInput.click()" [disabled]="saving" class="p-2 rounded-lg text-slate-500 hover:text-brand-purple hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors disabled:opacity-50" title="Subir informe Excel">
          <svg *ngIf="!saving" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l4-4m0 0l4 4m-4-4v12" />
          </svg>
          <svg *ngIf="saving" class="w-5 h-5 animate-spin text-brand-purple" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
        </button>
      </div>
    </div>

    <div class="relative flex-1 sm:flex-none min-w-[160px] sm:min-w-0 sm:w-56">
      <input
        type="text"
        [ngModel]="searchQuery"
        (ngModelChange)="onSearchQueryChange($event)"
        placeholder="Buscar por nombre..."
        class="w-full pl-9 pr-3 py-2 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-sm text-slate-700 dark:text-slate-200 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-purple/30 focus:border-brand-purple transition-colors"
      />
      <svg class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
    </div>

    <label
      class="group flex items-center gap-2 px-3 py-2 rounded-xl cursor-pointer select-none transition-all border"
      [ngClass]="soloSinInforme ? 'bg-brand-purple/10 border-brand-purple/30 text-brand-purple' : 'bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300'"
    >
      <input type="checkbox" [ngModel]="soloSinInforme" (ngModelChange)="onSoloSinInformeChange($event)" class="sr-only" />
      <div class="relative w-9 h-5 rounded-full bg-slate-300 dark:bg-slate-600 transition-colors group-has-[:checked]:bg-brand-purple">
        <div class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white shadow transition-transform duration-200" [class.translate-x-4]="soloSinInforme"></div>
      </div>
      <span class="text-xs font-semibold">Solo pendientes</span>
    </label>
  </div>
</div>
