<div
  class="shrink-0 flex items-center justify-start gap-2 sm:gap-3 px-3 py-2 bg-white dark:bg-[#1a1b26] rounded-2xl shadow-sm dark:shadow-md border border-[#8854FF]/40 dark:border-[#8854FF]/50 w-full flex-wrap overflow-visible text-slate-800 dark:text-slate-200 transition-colors">
  <!-- Backdrop para cerrar dropdowns -->
  <div *ngIf="activeDropdown" (click)="closeDropdown.emit()" class="fixed inset-0 z-10 cursor-default"
    aria-hidden="true"></div>

  <!-- 1. Período Unificado -->
  <div class="flex items-center gap-1.5 relative z-20 shrink-0">
    <div class="relative">
      <button (click)="toggleDropdown.emit('periodo')"
        class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-slate-50 dark:bg-white/5 hover:bg-slate-100 dark:hover:bg-white/10 text-xs font-bold text-slate-700 dark:text-slate-200 transition-colors active:scale-[0.97] active:transition-transform focus:ring-1 focus:ring-brand-purple border border-slate-200 dark:border-transparent min-w-[110px] justify-between shadow-sm">
        <span class="truncate">{{ getMesLabel(selectedMes) }} {{ selectedAno }}</span>
        <svg class="w-3.5 h-3.5 text-slate-400 transition-transform shrink-0"
          [class.rotate-180]="activeDropdown === 'periodo'" fill="none" viewBox="0 0 24 24" stroke="currentColor"
          stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      </button>

      <!-- Panel unificado -->
      <div *ngIf="activeDropdown === 'periodo'"
        class="absolute top-full left-0 mt-2 w-64 bg-white dark:bg-[#1e2030] rounded-xl shadow-xl border border-slate-200 dark:border-white/10 overflow-hidden flex divide-x divide-slate-100 dark:divide-white/5 animate-in fade-in slide-in-from-top-1 duration-150">
        <!-- Columna Año -->
        <div class="w-20 max-h-[16.5rem] overflow-y-auto p-1.5 flex flex-col gap-0.5" style="scrollbar-width: thin;">
          <p
            class="text-[9px] font-bold text-slate-400 uppercase tracking-wider text-center py-1 mb-1 border-b border-slate-100 dark:border-white/5">
            Año</p>
          <button *ngFor="let a of anos" (click)="selectAno.emit(a)"
            class="w-full px-1 py-1.5 rounded-md text-xs font-bold transition-all text-center"
            [ngClass]="selectedAno === a ? 'bg-brand-purple text-white shadow-sm' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-white/5'">
            {{ a }}
          </button>
        </div>
        <!-- Columna Mes -->
        <div class="flex-1 max-h-[16.5rem] overflow-y-auto p-1.5 flex flex-col gap-0.5" style="scrollbar-width: thin;">
          <p
            class="text-[9px] font-bold text-slate-400 uppercase tracking-wider pl-2 py-1 mb-1 border-b border-slate-100 dark:border-white/5">
            Mes</p>
          <div class="grid grid-cols-2 gap-1">
            <button *ngFor="let m of meses" (click)="selectMes.emit(m.value)"
              class="w-full text-left px-2 py-1.5 rounded-md text-xs font-medium transition-all truncate"
              [ngClass]="selectedMes === m.value ? 'bg-brand-purple text-white shadow-sm' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-white/5'">
              {{ m.label }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="w-px h-5 bg-slate-200 dark:bg-slate-700/60 shrink-0 hidden sm:block" aria-hidden="true"></div>

  <!-- 2. Pendientes solos (Switch) y Búsqueda -->
  <div class="flex items-center gap-1.5 shrink-0">
    <div class="relative group transition-[width] duration-200 ease-[cubic-bezier(0.23,1,0.32,1)] shrink-0"
      [ngClass]="searchQuery ? 'w-36 sm:w-48' : 'w-8 hover:w-36 sm:hover:w-48 focus-within:w-36 sm:focus-within:w-48'">
      <input type="text" [ngModel]="searchQuery" (ngModelChange)="onSearchQueryChange($event)" placeholder="Buscar..."
        class="w-full h-8 pl-8 pr-2 rounded-lg text-xs transition-[background-color,border-color,box-shadow] duration-150 focus:outline-none focus:ring-1 focus:ring-brand-purple focus:border-brand-purple text-slate-800 dark:text-white"
        [ngClass]="searchQuery ? 'bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 placeholder-slate-400' : 'bg-transparent border border-transparent placeholder-transparent group-hover:bg-slate-50 dark:group-hover:bg-white/5 group-hover:border-slate-200 dark:group-hover:border-white/10 group-focus-within:bg-slate-50 dark:group-focus-within:bg-white/5 group-focus-within:border-brand-purple group-hover:placeholder-slate-400 group-focus-within:placeholder-slate-400 cursor-pointer group-hover:cursor-text group-focus-within:cursor-text'" />
      <div
        class="absolute left-0 top-0 w-8 h-8 flex items-center justify-center text-slate-400 pointer-events-none group-focus-within:text-brand-purple transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </div>
    </div>

    <label
      class="group flex items-center gap-1.5 px-2 py-1.5 rounded-lg cursor-pointer select-none transition-all border bg-slate-50 dark:bg-white/5 hover:bg-slate-100 dark:hover:bg-white/10 border-slate-200 dark:border-transparent"
      [class.border-brand-purple]="soloSinInforme" [class.bg-brand-purple]="soloSinInforme"
      [style.backgroundColor]="soloSinInforme ? 'rgba(136,84,255,0.1)' : ''">
      <input type="checkbox" [ngModel]="soloSinInforme" (ngModelChange)="onSoloSinInformeChange($event)"
        class="sr-only" />
      <div
        class="relative w-6 h-3.5 rounded-full bg-slate-300 dark:bg-slate-600 transition-colors group-has-[:checked]:bg-brand-purple">
        <div
          class="absolute top-[2px] left-[2px] w-2.5 h-2.5 rounded-full bg-white shadow transition-transform duration-200"
          [class.translate-x-2.5]="soloSinInforme"></div>
      </div>
      <span class="text-[10px] font-semibold" [class.text-brand-purple]="soloSinInforme"
        [class.text-slate-500]="!soloSinInforme" [class.dark:text-slate-300]="!soloSinInforme">Pendientes</span>
    </label>
  </div>

  <div class="w-px h-5 bg-slate-200 dark:bg-slate-700/60 shrink-0 hidden sm:block" aria-hidden="true"></div>

  <!-- 3. Vista y Grupos -->
  <div class="flex items-center gap-1.5 shrink-0" *ngIf="!isRestrictedUser">
    <div class="flex rounded-lg bg-slate-100 dark:bg-black/20 p-0.5 border border-slate-200 dark:border-white/5">
      <button (click)="setVista.emit(false)" [class.bg-white]="!vistaGrupo" [class.text-slate-900]="!vistaGrupo"
        [class.shadow-sm]="!vistaGrupo" [class.text-slate-500]="vistaGrupo" [class.dark:text-slate-400]="vistaGrupo"
        class="px-2.5 py-1 rounded-md text-[10px] font-bold transition-all">Cong.</button>
      <button (click)="setVista.emit(true)" [class.bg-white]="vistaGrupo" [class.text-slate-900]="vistaGrupo"
        [class.shadow-sm]="vistaGrupo" [class.text-slate-500]="!vistaGrupo" [class.dark:text-slate-400]="!vistaGrupo"
        class="px-2.5 py-1 rounded-md text-[10px] font-bold transition-all">Grupos</button>
    </div>

    <div *ngIf="vistaGrupo" class="relative z-20">
      <button (click)="toggleDropdown.emit('grupo')"
        class="flex items-center gap-1 px-2.5 py-1.5 rounded-lg bg-slate-50 dark:bg-white/5 hover:bg-slate-100 dark:hover:bg-white/10 border border-slate-200 dark:border-transparent text-xs font-semibold text-slate-700 dark:text-slate-200 transition-colors active:scale-[0.97] active:transition-transform focus:ring-1 focus:ring-brand-purple max-w-[120px] justify-between">
        <span class="truncate">{{ getGrupoLabel(selectedGrupo) }}</span>
        <svg class="w-3 h-3 text-slate-400 transition-transform shrink-0"
          [class.rotate-180]="activeDropdown === 'grupo'" fill="none" viewBox="0 0 24 24" stroke="currentColor"
          stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      </button>
      <div *ngIf="activeDropdown === 'grupo'"
        class="absolute top-full right-0 mt-2 w-48 bg-white dark:bg-[#1e2030] rounded-xl shadow-xl border border-slate-200 dark:border-white/10 overflow-hidden animate-in fade-in slide-in-from-top-1 duration-150">
        <div class="max-h-48 overflow-y-auto p-1">
          <button (click)="selectGrupo.emit(null)"
            class="w-full text-left px-2.5 py-1.5 rounded-lg text-xs font-medium transition-colors mb-0.5"
            [ngClass]="selectedGrupo === null ? 'bg-brand-purple/10 dark:bg-brand-purple/20 text-brand-purple' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-white/5'">Todos
            los grupos</button>
          <button *ngFor="let g of grupos" (click)="selectGrupo.emit(g.id_grupo)"
            class="w-full text-left px-2.5 py-1.5 rounded-lg text-xs font-medium transition-colors"
            [ngClass]="selectedGrupo === g.id_grupo ? 'bg-brand-purple/10 dark:bg-brand-purple/20 text-brand-purple' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-white/5'">
            {{ g.nombre_grupo }}
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="w-px h-5 bg-slate-200 dark:bg-slate-700/60 shrink-0 hidden sm:block" aria-hidden="true"
    *ngIf="!isRestrictedUser"></div>

  <!-- 4. Stats Integrados -->
  <div class="flex items-center justify-center shrink-0 px-2 sm:ml-auto w-full sm:w-auto mt-1 sm:mt-0">
    <div class="hidden sm:flex items-center">
      <div class="flex items-center gap-1 font-sans">
        <span class="text-base sm:text-lg font-black text-[#8854FF] leading-none">{{
          resumen?.informes_recibidos ?? 0 }}</span>
        <span class="text-slate-300 dark:text-slate-600 text-xs font-light" aria-hidden="true">/</span>
        <span class="text-base sm:text-lg font-black text-slate-800 dark:text-white leading-none">{{
          resumen?.total_publicadores ?? 0 }}</span>
        <span class="text-[10px] font-medium text-slate-500 dark:text-slate-400 ml-0.5">total</span>
      </div>
    </div>

    <!-- Divider -->
    <div class="hidden sm:block w-px h-5 sm:h-6 bg-slate-200 dark:bg-slate-700/60 shrink-0 mx-3 sm:mx-4"
      aria-hidden="true"></div>

    <div class="flex items-center gap-2">
      <div class="w-1.5 h-1.5 rounded-full shrink-0 shadow-sm"
        [ngClass]="missingReportsCount === 0 ? 'bg-emerald-500 dark:shadow-[0_0_8px_rgba(16,185,129,0.6)]' : 'bg-[#FF4757] dark:shadow-[0_0_8px_rgba(255,71,87,0.6)]'">
      </div>
      <div class="flex items-baseline gap-1">
        <p class="text-base sm:text-lg font-black text-slate-800 dark:text-white leading-none">{{
          missingReportsCount }}</p>
        <span class="text-[10px] font-medium text-slate-500 dark:text-slate-400">pendientes</span>
      </div>
    </div>
  </div>

  <!-- Excel Actions movidos al componente tabla -->
</div>
