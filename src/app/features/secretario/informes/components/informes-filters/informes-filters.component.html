<div
  class="shrink-0 flex items-center gap-1.5 p-1.5 sm:px-3 sm:py-2 bg-white dark:bg-[#1a1b26] rounded-2xl shadow-sm dark:shadow-md border border-[#8854FF]/30 dark:border-[#8854FF]/40 w-full overflow-visible text-slate-800 dark:text-slate-200 transition-colors">
  
  <!-- Backdrop para cerrar dropdowns -->
  <div *ngIf="activeDropdown" (click)="closeDropdown.emit()" class="fixed inset-0 z-10 cursor-default" aria-hidden="true"></div>

  <!-- 1. Período Unificado (Súper compacto en móvil) -->
  <div class="relative z-20 shrink-0">
    <button (click)="toggleDropdown.emit('periodo')"
      class="flex items-center gap-1 px-2.5 py-2 rounded-xl bg-slate-50 dark:bg-white/5 hover:bg-slate-100 dark:hover:bg-white/10 text-[11px] font-black text-slate-700 dark:text-slate-200 transition-all active:scale-95 border border-slate-200 dark:border-transparent shadow-sm h-9">
      <span class="truncate max-w-[55px] sm:max-w-none">{{ getMesLabel(selectedMes).substring(0,3) }}. {{ selectedAno }}</span>
      <svg class="w-3 h-3 text-slate-400 shrink-0" [class.rotate-180]="activeDropdown === 'periodo'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
      </svg>
    </button>

    <!-- Panel unificado -->
    <div *ngIf="activeDropdown === 'periodo'"
      class="absolute top-full left-0 mt-2 w-64 bg-white dark:bg-[#1e2030] rounded-xl shadow-xl border border-slate-200 dark:border-white/10 overflow-hidden flex divide-x divide-slate-100 dark:divide-white/5 animate-in fade-in slide-in-from-top-1 duration-150 z-50">
      <div class="w-20 max-h-[16.5rem] overflow-y-auto p-1.5 flex flex-col gap-0.5" style="scrollbar-width: thin;">
        <button *ngFor="let a of anos" (click)="selectAno.emit(a)"
          class="w-full px-1 py-1.5 rounded-md text-xs font-bold transition-all text-center"
          [ngClass]="selectedAno === a ? 'bg-brand-purple text-white shadow-sm' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-white/5'">
          {{ a }}
        </button>
      </div>
      <div class="flex-1 max-h-[16.5rem] overflow-y-auto p-1.5 flex flex-col gap-0.5" style="scrollbar-width: thin;">
        <div class="grid grid-cols-2 gap-1">
          <button *ngFor="let m of meses" (click)="selectMes.emit(m.value)"
            class="w-full text-left px-2.5 py-1.5 rounded-md text-xs font-medium transition-all truncate"
            [ngClass]="selectedMes === m.value ? 'bg-brand-purple text-white shadow-sm' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-white/5'">
            {{ m.label }}
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 2. Selección de Grupo (Solo si Vista Grupo es activa y no restringido) -->
  <div *ngIf="vistaGrupo && !isRestrictedUser" class="relative z-20 flex-1 min-w-0 transition-all animate-in slide-in-from-left-2">
    <button (click)="toggleDropdown.emit('grupo')"
      class="w-full flex items-center justify-between gap-1.5 px-3 py-2 rounded-xl bg-purple-50/50 dark:bg-brand-purple/5 border border-brand-purple/20 hover:border-brand-purple/40 text-xs font-bold text-slate-700 dark:text-slate-200 transition-all active:scale-95 h-9 shadow-sm">
      <span class="truncate">{{ selectedGrupo === null ? 'Todos' : getGrupoLabel(selectedGrupo) }}</span>
      <svg class="w-3.5 h-3.5 text-brand-purple/60 shrink-0" [class.rotate-180]="activeDropdown === 'grupo'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
      </svg>
    </button>
    <!-- Dropdown Grupo -->
    <div *ngIf="activeDropdown === 'grupo'"
      class="absolute top-full right-0 mt-2 w-48 bg-white dark:bg-[#1e2030] rounded-xl shadow-xl border border-slate-200 dark:border-white/10 overflow-hidden animate-in fade-in slide-in-from-top-1 duration-150 z-50">
      <div class="max-h-56 overflow-y-auto p-1.5 flex flex-col gap-0.5">
        <button (click)="selectGrupo.emit(null)" class="w-full text-left px-3 py-2 rounded-lg text-xs font-semibold" [ngClass]="selectedGrupo === null ? 'bg-brand-purple text-white' : 'hover:bg-slate-50 dark:hover:bg-white/5'">Todos</button>
        <button *ngFor="let g of grupos" (click)="selectGrupo.emit(g.id_grupo)" class="w-full text-left px-3 py-2 rounded-lg text-xs font-medium" [ngClass]="selectedGrupo === g.id_grupo ? 'bg-brand-purple/10 text-brand-purple font-bold' : 'hover:bg-slate-50 dark:hover:bg-white/5'">{{ g.nombre_grupo }}</button>
      </div>
    </div>
  </div>

  <!-- Space Filler si no hay grupo -->
  <div class="flex-1" *ngIf="!vistaGrupo || isRestrictedUser"></div>

  <!-- 3. Acciones rápidas (Solo Iconos en Móvil) -->
  <div class="flex items-center gap-1 shrink-0">
    <!-- View Toggle (Cong vs Grupos) -->
    <button *ngIf="!isRestrictedUser" (click)="setVista.emit(!vistaGrupo)"
      class="w-9 h-9 flex items-center justify-center rounded-xl transition-all active:scale-90 border h-9"
      [title]="vistaGrupo ? 'Ver Congregación' : 'Ver Grupos'"
      [ngClass]="vistaGrupo ? 'bg-indigo-50 border-indigo-200 text-indigo-600 dark:bg-indigo-900/20 dark:border-indigo-800' : 'bg-slate-50 border-slate-200 dark:bg-white/5 dark:border-transparent text-slate-500'">
      <svg *ngIf="!vistaGrupo" class="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
      </svg>
      <svg *ngIf="vistaGrupo" class="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
      </svg>
    </button>

    <!-- Toggle Pendientes con Badge de Contador -->
    <button (click)="onSoloSinInformeChange(!soloSinInforme)"
      class="relative w-9 h-9 flex items-center justify-center rounded-xl border transition-all active:scale-90"
      [ngClass]="soloSinInforme ? 'bg-rose-50 border-rose-200 text-rose-600 dark:bg-rose-900/20 dark:border-rose-800' : 'bg-slate-50 border-slate-200 dark:bg-white/5 dark:border-transparent text-slate-400'">
      <svg class="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
      <!-- Mini Badge count -->
      <span *ngIf="missingReportsCount > 0" 
        class="absolute -top-1 -right-1 flex h-4 min-w-[16px] px-1 items-center justify-center rounded-full bg-[#FF4757] text-[9px] font-black text-white shadow-sm ring-2 ring-white dark:ring-[#1a1b26]">
        {{ missingReportsCount }}
      </span>
      <span *ngIf="missingReportsCount === 0" class="absolute -top-1 -right-1 flex h-3 w-3 rounded-full bg-emerald-500 shadow-sm ring-2 ring-white dark:ring-[#1a1b26]"></span>
    </button>

    <!-- Buscador Expandible (Ultramcompacto) -->
    <div class="relative group h-9 flex items-center">
      <input type="text" [ngModel]="searchQuery" (ngModelChange)="onSearchQueryChange($event)"
        class="h-9 transition-all duration-300 ease-[cubic-bezier(0.23,1,0.32,1)] rounded-xl text-xs bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-transparent focus:outline-none focus:ring-1 focus:ring-brand-purple focus:border-brand-purple focus:w-32 placeholder:text-slate-400"
        [ngClass]="searchQuery ? 'w-32 pl-8 pr-2 border-brand-purple shadow-sm' : 'w-9 pl-9 pr-0 hover:w-32 focus:w-32 cursor-pointer'"
        placeholder="Buscar..." />
      <div class="absolute left-0 w-9 h-9 flex items-center justify-center text-slate-400 pointer-events-none group-focus-within:text-brand-purple transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </div>
    </div>
  </div>
</div>
