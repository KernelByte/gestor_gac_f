<div class="shrink-0 flex items-center justify-center sm:justify-start gap-2 sm:gap-3 px-2 sm:pl-3 sm:pr-2 py-2 bg-white dark:bg-[#131521] rounded-[1.25rem] shadow-sm dark:shadow-md border border-[#8854FF]/30 dark:border-[#8854FF]/40 w-full lg:w-auto flex-wrap xl:flex-nowrap overflow-visible text-slate-800 dark:text-slate-200 transition-colors" style="scrollbar-width: none;">
  <!-- Backdrop para cerrar dropdowns -->
  <div *ngIf="activeDropdown" (click)="closeDropdown.emit()" class="fixed inset-0 z-10 cursor-default" aria-hidden="true"></div>

  <!-- 1. Período -->
  <div class="flex items-center gap-1.5 relative z-20 shrink-0">
    <!-- Año -->
    <div class="relative">
      <button (click)="toggleDropdown.emit('ano')" class="flex items-center gap-1 px-2.5 py-1.5 rounded-lg bg-slate-50 dark:bg-white/5 hover:bg-slate-100 dark:hover:bg-white/10 text-xs font-semibold text-slate-700 dark:text-slate-200 transition-colors focus:ring-1 focus:ring-brand-purple border border-slate-200 dark:border-transparent">
        <span>{{ selectedAno }}</span>
        <svg class="w-3 h-3 text-slate-400 transition-transform" [class.rotate-180]="activeDropdown === 'ano'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      </button>
      <div *ngIf="activeDropdown === 'ano'" class="absolute top-full left-0 mt-2 w-24 bg-white dark:bg-[#1e2030] rounded-xl shadow-xl border border-slate-200 dark:border-white/10 overflow-hidden">
        <div class="max-h-48 overflow-y-auto p-1">
          <button *ngFor="let a of anos" (click)="selectAno.emit(a)" class="w-full text-left px-2.5 py-1.5 rounded-lg text-xs font-medium transition-colors" [ngClass]="selectedAno === a ? 'bg-brand-purple/10 dark:bg-brand-purple/20 text-brand-purple' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-white/5'">
            {{ a }}
          </button>
        </div>
      </div>
    </div>

    <!-- Mes -->
    <div class="relative">
      <button (click)="toggleDropdown.emit('mes')" class="flex items-center gap-1 px-2.5 py-1.5 rounded-lg bg-slate-50 dark:bg-white/5 hover:bg-slate-100 dark:hover:bg-white/10 border border-slate-200 dark:border-transparent text-xs font-semibold text-slate-700 dark:text-slate-200 transition-colors focus:ring-1 focus:ring-brand-purple min-w-[70px] justify-between">
        <span class="truncate">{{ getMesLabel(selectedMes) }}</span>
        <svg class="w-3 h-3 text-slate-400 transition-transform shrink-0" [class.rotate-180]="activeDropdown === 'mes'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      </button>
      <div *ngIf="activeDropdown === 'mes'" class="absolute top-full left-0 mt-2 w-32 bg-white dark:bg-[#1e2030] rounded-xl shadow-xl border border-slate-200 dark:border-white/10 overflow-hidden">
        <div class="max-h-48 overflow-y-auto p-1">
          <button *ngFor="let m of meses" (click)="selectMes.emit(m.value)" class="w-full text-left px-2.5 py-1.5 rounded-lg text-xs font-medium transition-colors" [ngClass]="selectedMes === m.value ? 'bg-brand-purple/10 dark:bg-brand-purple/20 text-brand-purple' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-white/5'">
            {{ m.label }}
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="w-px h-5 bg-slate-200 dark:bg-slate-700/60 shrink-0 hidden sm:block" aria-hidden="true"></div>

  <!-- 2. Pendientes solos (Switch) y Búsqueda -->
  <div class="flex items-center gap-1.5 shrink-0">
    <div class="relative w-36 sm:w-48">
      <input type="text" [ngModel]="searchQuery" (ngModelChange)="onSearchQueryChange($event)" placeholder="Buscar..." class="w-full pl-7 pr-2 py-1.5 rounded-lg bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 text-xs text-slate-800 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-1 focus:ring-brand-purple focus:border-brand-purple transition-colors" />
      <svg class="w-3.5 h-3.5 text-slate-400 absolute left-2 top-1/2 -translate-y-1/2 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
    </div>

    <label class="group flex items-center gap-1.5 px-2 py-1.5 rounded-lg cursor-pointer select-none transition-all border bg-slate-50 dark:bg-white/5 hover:bg-slate-100 dark:hover:bg-white/10 border-slate-200 dark:border-transparent" [class.border-brand-purple]="soloSinInforme" [class.bg-brand-purple]="soloSinInforme" [style.backgroundColor]="soloSinInforme ? 'rgba(136,84,255,0.1)' : ''">
      <input type="checkbox" [ngModel]="soloSinInforme" (ngModelChange)="onSoloSinInformeChange($event)" class="sr-only" />
      <div class="relative w-6 h-3.5 rounded-full bg-slate-300 dark:bg-slate-600 transition-colors group-has-[:checked]:bg-brand-purple">
        <div class="absolute top-[2px] left-[2px] w-2.5 h-2.5 rounded-full bg-white shadow transition-transform duration-200" [class.translate-x-2.5]="soloSinInforme"></div>
      </div>
      <span class="text-[10px] font-semibold" [class.text-brand-purple]="soloSinInforme" [class.text-slate-500]="!soloSinInforme" [class.dark:text-slate-300]="!soloSinInforme">Pendientes</span>
    </label>
  </div>

  <div class="w-px h-5 bg-slate-200 dark:bg-slate-700/60 shrink-0 hidden sm:block" aria-hidden="true"></div>

  <!-- 3. Vista y Grupos -->
  <div class="flex items-center gap-1.5 shrink-0" *ngIf="!isRestrictedUser">
    <div class="hidden xl:flex rounded-lg bg-slate-100 dark:bg-black/20 p-0.5 border border-slate-200 dark:border-white/5">
      <button (click)="setVista.emit(false)" [class.bg-white]="!vistaGrupo" [class.text-slate-900]="!vistaGrupo" [class.shadow-sm]="!vistaGrupo" [class.text-slate-500]="vistaGrupo" [class.dark:text-slate-400]="vistaGrupo" class="px-2.5 py-1 rounded-md text-[10px] font-bold transition-all">Cong.</button>
      <button (click)="setVista.emit(true)" [class.bg-white]="vistaGrupo" [class.text-slate-900]="vistaGrupo" [class.shadow-sm]="vistaGrupo" [class.text-slate-500]="!vistaGrupo" [class.dark:text-slate-400]="!vistaGrupo" class="px-2.5 py-1 rounded-md text-[10px] font-bold transition-all">Grupos</button>
    </div>

    <div *ngIf="vistaGrupo" class="relative z-20">
      <button (click)="toggleDropdown.emit('grupo')" class="flex items-center gap-1 px-2.5 py-1.5 rounded-lg bg-slate-50 dark:bg-white/5 hover:bg-slate-100 dark:hover:bg-white/10 border border-slate-200 dark:border-transparent text-xs font-semibold text-slate-700 dark:text-slate-200 transition-colors focus:ring-1 focus:ring-brand-purple max-w-[120px] justify-between">
        <span class="truncate">{{ getGrupoLabel(selectedGrupo) }}</span>
        <svg class="w-3 h-3 text-slate-400 transition-transform shrink-0" [class.rotate-180]="activeDropdown === 'grupo'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      </button>
      <div *ngIf="activeDropdown === 'grupo'" class="absolute top-full right-0 mt-2 w-48 bg-white dark:bg-[#1e2030] rounded-xl shadow-xl border border-slate-200 dark:border-white/10 overflow-hidden">
        <div class="max-h-48 overflow-y-auto p-1">
          <button (click)="selectGrupo.emit(null)" class="w-full text-left px-2.5 py-1.5 rounded-lg text-xs font-medium transition-colors mb-0.5" [ngClass]="selectedGrupo === null ? 'bg-brand-purple/10 dark:bg-brand-purple/20 text-brand-purple' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-white/5'">Todos los grupos</button>
          <button *ngFor="let g of grupos" (click)="selectGrupo.emit(g.id_grupo)" class="w-full text-left px-2.5 py-1.5 rounded-lg text-xs font-medium transition-colors" [ngClass]="selectedGrupo === g.id_grupo ? 'bg-brand-purple/10 dark:bg-brand-purple/20 text-brand-purple' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-white/5'">
            {{ g.nombre_grupo }}
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="w-px h-5 bg-slate-200 dark:bg-slate-700/60 shrink-0 hidden xl:block" aria-hidden="true" *ngIf="!isRestrictedUser"></div>

  <!-- 4. Stats Integrados -->
  <div class="flex items-center justify-center shrink-0 px-2 sm:ml-auto w-full sm:w-auto mt-1 sm:mt-0">
    <div class="flex flex-col justify-center items-center sm:items-start">
       <p class="text-[10px] sm:text-[0.625rem] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-0.5 sm:mb-1">Informes del mes</p>
       <div class="flex items-baseline gap-1.5 font-sans">
         <span class="text-base sm:text-lg font-black leading-none tracking-tight text-[#8854FF] p-0 mb-0 mt-0">{{ resumen?.informes_recibidos ?? 0 }}</span>
         <span class="text-[10px] sm:text-[11px] font-medium text-slate-500 dark:text-slate-400">recibidos</span>
         <span class="text-slate-300 dark:text-slate-600 text-[10px] sm:text-xs mx-0.5 font-light" aria-hidden="true">/</span>
         <span class="text-base sm:text-lg font-black leading-none tracking-tight text-slate-800 dark:text-white">{{ resumen?.total_publicadores ?? 0 }}</span>
         <span class="text-[10px] sm:text-[11px] font-medium text-slate-500 dark:text-slate-400">total</span>
       </div>
    </div>

    <!-- Divider -->
    <div class="w-px h-5 sm:h-6 bg-slate-200 dark:bg-slate-700/60 shrink-0 mx-3 sm:mx-4" aria-hidden="true"></div>

    <div class="flex flex-col justify-center items-center sm:items-start">
      <p class="text-[10px] sm:text-[0.625rem] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-0.5 sm:mb-1">Pendientes</p>
      <div class="flex items-center gap-1.5 sm:gap-2">
        <div class="w-1.5 h-1.5 sm:w-2 sm:h-2 rounded-full shrink-0 shadow-sm" [ngClass]="missingReportsCount === 0 ? 'bg-emerald-500 dark:shadow-[0_0_8px_rgba(16,185,129,0.6)]' : 'bg-[#FF4757] dark:shadow-[0_0_8px_rgba(255,71,87,0.6)]'"></div>
        <p class="text-base sm:text-lg font-black text-slate-800 dark:text-white leading-none tracking-tight">{{ missingReportsCount }}</p>
      </div>
    </div>
  </div>

  <div class="w-px h-5 bg-slate-200 dark:bg-slate-700/60 shrink-0 hidden sm:block" aria-hidden="true" *ngIf="!isRestrictedUser"></div>

  <!-- 5. Excel Actions -->
  <div class="flex items-center gap-1 border-l border-transparent shrink-0" *ngIf="!isRestrictedUser">
    <button (click)="exportExcel.emit()" class="p-1.5 rounded-lg text-slate-400 hover:text-emerald-500 dark:hover:text-emerald-400 hover:bg-slate-50 dark:hover:bg-white/10 transition-colors" title="Descargar plantilla Excel">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
      </svg>
    </button>
    <div class="relative">
      <input type="file" #fileInput accept=".xlsx" (change)="importExcel.emit($event)" class="hidden" />
      <button (click)="fileInput.click()" [disabled]="saving" class="p-1.5 rounded-lg text-slate-400 hover:text-emerald-500 dark:hover:text-emerald-400 hover:bg-slate-50 dark:hover:bg-white/10 transition-colors disabled:opacity-50" title="Subir informe Excel">
        <svg *ngIf="!saving" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l4-4m0 0l4 4m-4-4v12" />
        </svg>
        <svg *ngIf="saving" class="w-4 h-4 animate-spin text-emerald-500 dark:text-emerald-400" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
      </button>
    </div>
  </div>
</div>
