<!-- Barra de estado: lo esencial primero (informes) y resumen del mes (cursos + horas) -->
<div class="shrink-0 hidden sm:block">
  <div class="flex flex-col gap-3">
    <!-- Fila 1: Informes (métrica principal) -->
    <div class="flex items-center gap-4 flex-wrap">
      <div
        class="flex items-center gap-4 px-4 py-3 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200/60 dark:border-slate-800 shadow-sm min-w-0">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-brand-purple/10 dark:bg-brand-purple/20 flex items-center justify-center shrink-0">
            <svg class="w-5 h-5 text-brand-purple" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
          </div>
          <div>
            <p class="text-[0.625rem] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Informes del mes</p>
            <p class="text-xl sm:text-2xl font-black text-slate-900 dark:text-white tracking-tight flex items-baseline gap-1.5 flex-wrap">
              <span class="text-brand-purple">{{ resumen?.informes_recibidos ?? 0 }}</span>
              <span class="text-xs font-semibold text-slate-500 dark:text-slate-400 normal-case">recibidos</span>
              <span class="text-slate-300 dark:text-slate-600 font-semibold text-base mx-0.5" aria-hidden="true">/</span>
              <span>{{ resumen?.total_publicadores ?? 0 }}</span>
              <span class="text-xs font-semibold text-slate-500 dark:text-slate-400 normal-case">total</span>
            </p>
          </div>
        </div>
        <div class="h-8 w-px bg-slate-200 dark:bg-slate-700 shrink-0" aria-hidden="true"></div>
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-rose-500 shrink-0" aria-hidden="true"></span>
          <div>
            <p class="text-[0.625rem] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Pendientes</p>
            <p class="text-lg font-bold text-slate-700 dark:text-slate-200">{{ missingReportsCount }}</p>
          </div>
        </div>
      </div>

      <!-- Resumen compacto: Cursos + Horas -->
      <div
        class="flex items-center gap-2 sm:gap-4 px-4 py-3 rounded-2xl bg-slate-50 dark:bg-slate-800/50 border border-slate-100 dark:border-slate-800">
        <div class="flex items-center gap-2">
          <span class="text-[0.625rem] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Cursos</span>
          <span class="text-lg font-bold text-slate-800 dark:text-white tabular-nums">{{ resumen?.total_cursos ?? 0 }}</span>
        </div>
        <div class="w-px h-6 bg-slate-200 dark:bg-slate-700" aria-hidden="true"></div>
        <div class="flex items-center gap-2">
          <span class="w-1.5 h-1.5 rounded-full bg-blue-500 shrink-0" aria-hidden="true"></span>
          <span class="text-[0.625rem] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">H. reg.</span>
          <span class="text-lg font-bold text-slate-800 dark:text-white tabular-nums">{{ regularHours | number }}</span>
        </div>
        <div class="w-px h-6 bg-slate-200 dark:bg-slate-700" aria-hidden="true"></div>
        <div class="flex items-center gap-2">
          <span class="w-1.5 h-1.5 rounded-full bg-amber-500 shrink-0" aria-hidden="true"></span>
          <span class="text-[0.625rem] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">H. aux.</span>
          <span class="text-lg font-bold text-slate-800 dark:text-white tabular-nums">{{ auxiliaryHours | number }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
