<div class="shrink-0 flex items-stretch gap-4 pl-2 pr-5 py-2.5 sm:py-3 bg-[#131521] dark:bg-slate-900 rounded-[1.25rem] shadow-sm border border-slate-200/10 dark:border-slate-800 w-full sm:w-auto h-full text-slate-200">
  <!-- Left Side: Informes del mes -->
  <div class="flex items-center gap-3">
    <!-- Icon Container -->
    <div class="w-12 h-12 rounded-2xl bg-[#2A2B45] flex items-center justify-center shrink-0 shadow-inner">
      <svg class="w-5 h-5 text-[#8854FF]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
      </svg>
    </div>
    
    <!-- Text Information -->
    <div class="flex flex-col justify-center">
      <p class="text-[0.625rem] font-bold text-slate-400 uppercase tracking-wider mb-0.5">Informes del mes</p>
      <div class="flex items-baseline gap-1.5 font-sans">
        <span class="text-xl sm:text-[1.35rem] font-black leading-none tracking-tight text-[#8854FF]">{{ resumen?.informes_recibidos ?? 0 }}</span>
        <span class="text-xs font-medium text-slate-400">recibidos</span>
        <span class="text-slate-500 text-sm mx-0.5 font-light" aria-hidden="true">/</span>
        <span class="text-xl sm:text-[1.35rem] font-black leading-none tracking-tight text-white">{{ resumen?.total_publicadores ?? 0 }}</span>
        <span class="text-xs font-medium text-slate-400">total</span>
      </div>
    </div>
  </div>

  <!-- Vertical Divider -->
  <div class="w-px bg-slate-700/60 my-1.5 shrink-0" aria-hidden="true"></div>

  <!-- Right Side: Pendientes -->
  <div class="flex items-center gap-2.5">
    <div class="w-2 h-2 rounded-full bg-[#FF4757] shrink-0 shadow-[0_0_8px_rgba(255,71,87,0.6)]" aria-hidden="true"></div>
    <div class="flex flex-col justify-center">
      <p class="text-[0.625rem] font-bold text-slate-400 uppercase tracking-wider mb-0.5">Pendientes</p>
      <p class="text-xl sm:text-[1.35rem] font-black text-white leading-none tracking-tight">{{ missingReportsCount }}</p>
    </div>
  </div>
</div>
