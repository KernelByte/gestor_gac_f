<div class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 bg-slate-900/60 backdrop-blur-sm">
    <div class="bg-white dark:bg-slate-900 rounded-2xl w-full max-w-4xl shadow-2xl border border-slate-200 dark:border-slate-800 overflow-hidden flex flex-col max-h-[90vh]">
        
        <!-- Header -->
        <div class="px-6 py-5 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between shrink-0 bg-gradient-to-r from-indigo-50 to-slate-50 dark:from-indigo-950/30 dark:to-slate-900/50">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-full bg-indigo-100 dark:bg-indigo-900/50 flex items-center justify-center text-indigo-600 dark:text-indigo-400">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-slate-800 dark:text-white">Editar Historial</h2>
                    <p class="text-sm text-slate-500 dark:text-slate-400 font-medium">{{ publicadorNombre }}</p>
                </div>
            </div>

            <!-- Active Period Badge (prominent) -->
            <div class="flex items-center gap-3">
                <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 bg-indigo-600 text-white rounded-lg text-sm font-bold shadow-sm">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    {{ titleText }}
                </div>
                <button (click)="cancelar()"
                    class="w-8 h-8 rounded-full flex items-center justify-center text-slate-400 hover:text-slate-600 hover:bg-slate-100 dark:hover:text-slate-300 dark:hover:bg-slate-800 transition-colors">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Body -->
        <div class="flex flex-1 overflow-hidden flex-col md:flex-row">
            
            <!-- Left Panel: Year/Month Navigation -->
            <div class="w-full md:w-60 border-b md:border-b-0 md:border-r border-slate-200 dark:border-slate-800 flex flex-col shrink-0 bg-white dark:bg-slate-900">
                
                <!-- Year Selector (compact dropdown-like) -->
                <div class="p-3 border-b border-slate-200 dark:border-slate-800">
                    <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 px-1">Año</h3>
                    <div *ngIf="loadingPeriodos()" class="flex items-center justify-center py-3">
                        <svg class="animate-spin h-5 w-5 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </div>
                    <div *ngIf="!loadingPeriodos()" class="flex flex-wrap gap-1.5">
                        <button *ngFor="let a of availableAnos()" 
                            (click)="onAnoSelect(a)"
                            class="relative px-2.5 py-1 text-xs font-semibold rounded-md border transition-all duration-200 disabled:opacity-50"
                            [ngClass]="selectedAno() === a 
                                ? 'bg-indigo-600 text-white border-indigo-600 dark:bg-indigo-600 dark:border-indigo-500 shadow-sm ring-2 ring-indigo-200 dark:ring-indigo-800' 
                                : 'bg-white text-slate-500 border-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 hover:border-indigo-300 dark:hover:border-indigo-700'"
                            [disabled]="loading() || saving()">
                            {{ a }}
                            <div *ngIf="hasChangesInYear(a)" class="absolute -top-0.5 -right-0.5 w-2 h-2 bg-amber-400 rounded-full border border-white dark:border-slate-800 animate-pulse"></div>
                        </button>
                    </div>
                </div>

                <!-- Month List -->
                <div class="flex-1 overflow-y-auto p-3">
                    <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 px-1">Mes</h3>
                    <div class="space-y-1">
                        <button *ngFor="let m of availableMeses()" 
                            (click)="onMesSelect(m.num)"
                            class="relative w-full px-3 py-2 text-sm font-medium rounded-lg text-left transition-all duration-200 flex items-center justify-between disabled:opacity-50"
                            [ngClass]="selectedMes() === m.num 
                                ? 'bg-indigo-50 text-indigo-700 dark:bg-indigo-900/40 dark:text-indigo-300 font-bold' 
                                : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800'"
                            [disabled]="loading() || saving()">
                            <div class="flex items-center gap-2">
                                <!-- Active line indicator -->
                                <div class="w-0.5 h-4 rounded-full transition-colors"
                                     [ngClass]="selectedMes() === m.num ? 'bg-indigo-600 dark:bg-indigo-400' : 'bg-transparent'"></div>
                                <span>{{ m.name }}</span>
                            </div>
                            <div class="flex items-center gap-1.5">
                                <div *ngIf="hasChanges(selectedAno(), m.num)" class="w-1.5 h-1.5 bg-amber-500 rounded-full animate-pulse"></div>
                                <svg *ngIf="selectedMes() === m.num" class="w-4 h-4 text-indigo-600 dark:text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
                                </svg>
                            </div>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Loading State -->
            <div *ngIf="loading()" class="flex-1 flex flex-col items-center justify-center p-8">
                <svg class="animate-spin h-10 w-10 text-indigo-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-slate-500 dark:text-slate-400 font-medium">Cargando datos...</p>
            </div>

            <!-- Right Panel: Form Editor -->
            <div *ngIf="!loading()" class="flex-1 overflow-y-auto p-5 bg-slate-50 dark:bg-[#0B1120]">
                
                <!-- Step 1: Actividad del Ministerio (Primary Action) -->
                <div class="mb-5">
                    <!-- Card: Participación Toggle -->
                    <div class="flex items-center justify-between p-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-sm">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-lg flex items-center justify-center"
                                 [ngClass]="participo() ? 'bg-emerald-100 dark:bg-emerald-900/40 text-emerald-600 dark:text-emerald-400' : 'bg-slate-100 dark:bg-slate-700 text-slate-400'">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                            </div>
                            <div>
                                <p class="font-bold text-sm text-slate-800 dark:text-white">Participó en el ministerio</p>
                                <p class="text-xs text-slate-400 dark:text-slate-500">Indica si tuvo participación este mes</p>
                            </div>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox"
                                   [ngModel]="participo()"
                                   (ngModelChange)="participo.set($event)"
                                   class="sr-only peer">
                            <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-indigo-300 dark:peer-focus:ring-indigo-800 rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-slate-600 peer-checked:bg-emerald-500"></div>
                        </label>
                    </div>
                </div>

                <!-- Step 2: Datos Numéricos (Cursos + Horas) -->
                <div class="mb-5">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4 shadow-sm">
                            <div class="flex items-center gap-2 mb-2.5">
                                <svg class="w-4 h-4 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                                </svg>
                                <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Cursos Bíblicos</label>
                            </div>
                            <input type="number" 
                                   min="0"
                                   [ngModel]="cursosBiblicos()"
                                   (ngModelChange)="cursosBiblicos.set($event)"
                                   class="w-full bg-slate-50 dark:bg-slate-900 border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-lg text-lg font-bold text-center focus:border-indigo-500 focus:ring-indigo-500 p-2.5">
                        </div>
                        <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4 shadow-sm">
                            <div class="flex items-center gap-2 mb-2.5">
                                <svg class="w-4 h-4 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                                <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Horas</label>
                            </div>
                            <input type="number" 
                                   min="0"
                                   [ngModel]="horas()"
                                   (ngModelChange)="horas.set($event)"
                                   class="w-full bg-slate-50 dark:bg-slate-900 border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-lg text-lg font-bold text-center focus:border-indigo-500 focus:ring-indigo-500 p-2.5">
                        </div>
                    </div>
                </div>

                <!-- Step 3: Precursores (Secondary - Collapsible feel) -->
                <div class="mb-5">
                    <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 px-1">Tipo de Precursor</h4>
                    <div class="grid grid-cols-3 gap-2">
                        <button (click)="togglePrivilegio('Auxiliar')"
                            class="flex flex-col items-center gap-1.5 p-3 rounded-xl border-2 transition-all duration-200 cursor-pointer"
                            [ngClass]="esAuxiliar() 
                                ? 'border-amber-400 bg-amber-50 dark:bg-amber-900/20 dark:border-amber-600' 
                                : 'border-slate-200 bg-white dark:border-slate-700 dark:bg-slate-800 hover:border-slate-300 dark:hover:border-slate-600'">
                            <div class="w-7 h-7 rounded-full flex items-center justify-center"
                                [ngClass]="esAuxiliar() ? 'bg-amber-100 dark:bg-amber-900/50 text-amber-600 dark:text-amber-400' : 'bg-slate-100 dark:bg-slate-700 text-slate-400'">
                                <svg *ngIf="esAuxiliar()" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
                                </svg>
                                <svg *ngIf="!esAuxiliar()" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                                </svg>
                            </div>
                            <span class="text-xs font-semibold" 
                                [ngClass]="esAuxiliar() ? 'text-amber-700 dark:text-amber-300' : 'text-slate-500 dark:text-slate-400'">Auxiliar</span>
                        </button>

                        <button (click)="togglePrivilegio('Regular')"
                            class="flex flex-col items-center gap-1.5 p-3 rounded-xl border-2 transition-all duration-200 cursor-pointer"
                            [ngClass]="esRegular() 
                                ? 'border-indigo-400 bg-indigo-50 dark:bg-indigo-900/20 dark:border-indigo-600' 
                                : 'border-slate-200 bg-white dark:border-slate-700 dark:bg-slate-800 hover:border-slate-300 dark:hover:border-slate-600'">
                            <div class="w-7 h-7 rounded-full flex items-center justify-center"
                                [ngClass]="esRegular() ? 'bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400' : 'bg-slate-100 dark:bg-slate-700 text-slate-400'">
                                <svg *ngIf="esRegular()" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
                                </svg>
                                <svg *ngIf="!esRegular()" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                                </svg>
                            </div>
                            <span class="text-xs font-semibold" 
                                [ngClass]="esRegular() ? 'text-indigo-700 dark:text-indigo-300' : 'text-slate-500 dark:text-slate-400'">Regular</span>
                        </button>

                        <button (click)="togglePrivilegio('Especial')"
                            class="flex flex-col items-center gap-1.5 p-3 rounded-xl border-2 transition-all duration-200 cursor-pointer"
                            [ngClass]="esEspecial() 
                                ? 'border-purple-400 bg-purple-50 dark:bg-purple-900/20 dark:border-purple-600' 
                                : 'border-slate-200 bg-white dark:border-slate-700 dark:bg-slate-800 hover:border-slate-300 dark:hover:border-slate-600'">
                            <div class="w-7 h-7 rounded-full flex items-center justify-center"
                                [ngClass]="esEspecial() ? 'bg-purple-100 dark:bg-purple-900/50 text-purple-600 dark:text-purple-400' : 'bg-slate-100 dark:bg-slate-700 text-slate-400'">
                                <svg *ngIf="esEspecial()" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
                                </svg>
                                <svg *ngIf="!esEspecial()" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                                </svg>
                            </div>
                            <span class="text-xs font-semibold" 
                                [ngClass]="esEspecial() ? 'text-purple-700 dark:text-purple-300' : 'text-slate-500 dark:text-slate-400'">Especial</span>
                        </button>
                    </div>
                </div>

                <!-- Step 4: Observaciones -->
                <div>
                    <div class="flex items-center gap-2 mb-2.5 px-1">
                        <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z" />
                        </svg>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Observaciones</label>
                    </div>
                    <textarea 
                        [ngModel]="observaciones()"
                        (ngModelChange)="observaciones.set($event)"
                        rows="2"
                        class="w-full bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-3 resize-none text-sm"
                        placeholder="Notas adicionales..."></textarea>
                </div>
                
            </div>
        </div>

        <!-- Footer -->
        <div class="px-6 py-3.5 border-t border-slate-200 dark:border-slate-800 flex items-center justify-between bg-white dark:bg-slate-900 shrink-0">
            <!-- Unsaved changes counter -->
            <div class="text-xs text-slate-400 dark:text-slate-500" *ngIf="pendingChanges.size > 0">
                <span class="inline-flex items-center gap-1.5">
                    <span class="w-2 h-2 bg-amber-400 rounded-full animate-pulse"></span>
                    {{ pendingChanges.size }} {{ pendingChanges.size === 1 ? 'cambio pendiente' : 'cambios pendientes' }}
                </span>
            </div>
            <div *ngIf="pendingChanges.size === 0"></div>
            
            <div class="flex items-center gap-3">
                <button (click)="cancelar()"
                        [disabled]="saving()"
                        class="px-5 py-2 text-sm font-semibold text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                    Cancelar
                </button>
                <button (click)="guardar()"
                        [disabled]="saving() || loading()"
                        class="px-5 py-2 text-sm font-semibold text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 transition-colors shadow-sm disabled:opacity-75 flex items-center gap-2">
                    <svg *ngIf="saving()" class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <svg *ngIf="!saving()" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                    Guardar
                </button>
            </div>
        </div>

    </div>
</div>
